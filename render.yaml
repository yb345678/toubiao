services:
  - type: web
    name: ai-bidding-backend
    runtime: docker
    repo: https://github.com/yb345678/toubiao
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: AI Bidding Multi-Agent Platform
      - key: API_V1_PREFIX
        value: /api/v1
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: OUTPUT_DIR
        value: /tmp/outputs
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: 50

  - type: web
    name: ai-bidding-frontend
    runtime: static
    repo: https://github.com/yb345678/toubiao
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
