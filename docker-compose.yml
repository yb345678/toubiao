services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-bidding-backend
    environment:
      APP_NAME: ${APP_NAME:-AI Bidding Multi-Agent Platform}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./database/app.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      OUTPUT_DIR: ${OUTPUT_DIR:-./outputs}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./database:/app/database
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: ai-bidding-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
